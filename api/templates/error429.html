<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5;url=/" />
    <title>Demasiadas Solicitudes - Scrabby</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f1010;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgb(179, 179, 179);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { color: #e74c3c; }
        p { font-size: 1.1em; color: #555; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Wow, vas muy rápido!</h1>
        <p>Nuestro sistema de seguridad detectó demasiadas solicitudes desde tu conexión. Por favor, espera un momento para continuar buscando placas de video.</p>
        <p><small>Serás redirigido automáticamente al inicio en 5 segundos...</small></p>
        
        <a href="/" class="btn">Volver al Inicio Ahora</a>
    </div>
</body>
</html>
