<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scrabby{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-sans antialiased">
    <header x-data="{ open: false }" class="bg-slate-950 border-b border-violet-800 shadow-lg shadow-violet-950/20">
        <div class="container mx-auto flex items-center justify-between px-4 py-4">
            <a href="/" class="text-xl font-extrabold tracking-tight text-violet-400 transition hover:text-cyan-400">
                Scrabby
            </a>

            <nav class="hidden items-center gap-2 lg:flex">
                <a href="/" class="rounded-md px-3 py-2 text-sm font-medium text-slate-300 transition hover:bg-slate-900 hover:text-cyan-400">Inicio</a>
                <a href="/products" class="rounded-md px-3 py-2 text-sm font-medium text-slate-300 transition hover:bg-slate-900 hover:text-cyan-400">Productos</a>
                {% if username %}
                    <a href="/users/dashboard" class="rounded-md px-3 py-2 text-sm font-medium text-slate-300 transition hover:bg-slate-900 hover:text-cyan-400">Dashboard</a>
                    <form action="/users/logout" method="post" class="inline">
                        <button type="submit" class="rounded-md border border-red-500/70 px-3 py-2 text-sm font-semibold text-red-300 transition hover:bg-red-950/40 hover:text-red-200">
                            Cerrar sesion
                        </button>
                    </form>
                {% else %}
                    <a href="/users/login" class="rounded-md bg-violet-600 px-4 py-2 text-sm font-semibold text-white shadow-md shadow-violet-950/40 transition hover:bg-violet-500">
                        Ingresar
                    </a>
                {% endif %}
            </nav>

            <button
                type="button"
                @click="open = !open"
                class="inline-flex h-10 w-10 items-center justify-center rounded-md border border-slate-700 text-slate-200 transition hover:border-cyan-500 hover:text-cyan-400 lg:hidden"
                aria-label="Abrir menu"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>

        <div x-show="open" x-cloak class="border-t border-violet-900 bg-slate-950 lg:hidden">
            <div class="container mx-auto flex flex-col gap-2 px-4 py-4">
                <a href="/" class="rounded-md px-3 py-2 text-sm font-medium text-slate-300 transition hover:bg-slate-900 hover:text-cyan-400">Inicio</a>
                <a href="/products" class="rounded-md px-3 py-2 text-sm font-medium text-slate-300 transition hover:bg-slate-900 hover:text-cyan-400">Productos</a>
                {% if username %}
                    <a href="/users/dashboard" class="rounded-md px-3 py-2 text-sm font-medium text-slate-300 transition hover:bg-slate-900 hover:text-cyan-400">Dashboard</a>
                    <form action="/users/logout" method="post" class="w-full">
                        <button type="submit" class="w-full rounded-md border border-red-500/70 px-3 py-2 text-left text-sm font-semibold text-red-300 transition hover:bg-red-950/40 hover:text-red-200">
                            Cerrar sesion
                        </button>
                    </form>
                {% else %}
                    <a href="/users/login" class="rounded-md bg-violet-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-violet-500">
                        Ingresar
                    </a>
                {% endif %}
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
