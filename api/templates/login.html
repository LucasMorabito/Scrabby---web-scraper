{% extends "base.html" %}

{% block title %}Iniciar sesión — Scrabby{% endblock %}

{% block content %}
<section class="flex min-h-[75vh] items-center justify-center py-8 px-4">
    <div class="w-full max-w-md bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 rounded-3xl shadow-xl dark:shadow-2xl relative overflow-hidden transition-colors duration-300">
        
        <!-- Efecto de brillo de fondo sutil -->
        <div class="absolute top-0 right-0 -mt-16 -mr-16 w-64 h-64 bg-brand-500/5 dark:bg-brand-500/10 rounded-full blur-[80px] pointer-events-none"></div>

        <div class="p-6 sm:p-8 relative z-10">
            
            <div class="flex justify-center mb-4">
                <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-brand-50 dark:bg-brand-500/10 border border-brand-100 dark:border-brand-500/20 text-brand-600 dark:text-brand-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                    </svg>
                </div>
            </div>

            <h2 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white text-center mb-6">
                Bienvenido de nuevo
            </h2>
            
            {% if error %}
                <div class="rounded-2xl border border-red-200 dark:border-red-900/50 bg-red-50 dark:bg-red-950/30 p-3 text-sm text-red-600 dark:text-red-400 mb-6 flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <span class="font-medium">{{ error }}</span>
                </div>
            {% endif %}
            
            <form action="/users/login" method="post" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-semibold tracking-wide text-slate-700 dark:text-zinc-300 mb-1.5" for="username">
                        Usuario
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Ingresa tu usuario"
                        required
                        class="h-11 w-full rounded-xl border border-slate-300 dark:border-zinc-700 bg-slate-50 dark:bg-zinc-900/50 px-4 text-sm text-slate-900 dark:text-zinc-200 outline-none transition placeholder:text-slate-400 dark:placeholder:text-zinc-600 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20"
                    />
                </div>

                <div>
                    <label class="block text-sm font-semibold tracking-wide text-slate-700 dark:text-zinc-300 mb-1.5" for="password">
                        Contraseña
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        class="h-11 w-full rounded-xl border border-slate-300 dark:border-zinc-700 bg-slate-50 dark:bg-zinc-900/50 px-4 text-sm text-slate-900 dark:text-zinc-200 outline-none transition placeholder:text-slate-400 dark:placeholder:text-zinc-600 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20"
                    />
                </div>

                <div class="pt-2">
                    <button 
                        type="submit" 
                        class="inline-flex h-11 w-full items-center justify-center rounded-xl bg-brand-500 font-bold text-white shadow-md shadow-brand-500/20 dark:shadow-[0_0_15px_rgba(249,115,22,0.25)] transition hover:bg-brand-600 hover:-translate-y-0.5"
                    >
                        Ingresar al Panel
                    </button>
                </div>
            </form>

            <p class="text-center text-sm text-slate-500 dark:text-zinc-400 mt-6">
                ¿No tienes cuenta?
                <a href="/users/register" class="font-bold text-brand-600 dark:text-brand-400 transition hover:text-brand-700 dark:hover:text-brand-300 ml-1">
                    Regístrate aquí
                </a>
            </p>
            
        </div>
    </div>
</section>
{% endblock %}
